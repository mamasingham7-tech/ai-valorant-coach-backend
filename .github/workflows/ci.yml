name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: valorant_coach
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff black mypy pytest-cov

    - name: Code Formatting Check (Black)
      run: black --check app tests

    - name: Lint Verification (Ruff)
      run: ruff check app tests

    - name: Run Test Suite with Coverage
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/valorant_coach
        REDIS_URL: redis://localhost:6379/0
        JWT_SECRET: test_jwt_secret_must_be_long_enough_32_chars_1234
        ENVIRONMENT: testing
      run: |
        python -m pytest --cov=app tests/ --cov-fail-under=90

    - name: Docker Build Validation
      run: |
        docker build -t ai-valorant-coach-backend:latest .
